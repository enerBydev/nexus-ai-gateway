version: 2
updates:
# Rust dependencies
- package-ecosystem: "cargo"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
  open-pull-requests-limit: 5
  labels:
    - "dependencies"
    - "automated"
  commit-message:
    prefix: "chore"
    include: "scope"
  groups:
    cargo-minor-patch:
      applies-to: "version-updates"
      update-types:
      - "minor"
      - "patch"
  ignore:
    # wiremock 0.6.5+ requires unstable let_chains feature — pinned to 0.6.4
    # A scheduled workflow monitors for new versions; see .github/workflows/deps-monitor.yml
    - dependency-name: "wiremock"
      versions: [">=0.6.5"]

# GitHub Actions
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
  open-pull-requests-limit: 3
  labels:
    - "dependencies"
    - "github-actions"
    - "automated"
  commit-message:
    prefix: "ci"
    include: "scope"
  groups:
    actions-minor-patch:
      applies-to: "version-updates"
      update-types:
      - "minor"
      - "patch"
