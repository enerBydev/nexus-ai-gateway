name: Auto Version & Release
# This workflow auto-bumps version based on conventional commits
# and creates a GitHub release when pushed to main.
#
# Trigger: Runs after CI/CD Pipeline passes on main
# Logic: Analyzes commits since last tag тЖТ determines bump тЖТ creates release
# Author: Commits as repo owner (enerBydev), not github-actions bot

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  auto-version:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git as repo owner
        run: |
          git config user.name "enerBydev"
          git config user.email "rjmemdoza.s@gmail.com"

      - name: Analyze commits for version bump
        id: analyze
        run: |
          CURRENT_VERSION=$(cat VERSION)
          CURRENT_TAG="v${CURRENT_VERSION}"

          if ! git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "bump=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMITS=$(git log "${CURRENT_TAG}..HEAD" --oneline 2>/dev/null)
          TOTAL=$(echo "$COMMITS" | grep -c '.' || true)

          if [ "$TOTAL" -eq 0 ]; then
            echo "bump=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          FEAT=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ feat' || true)
          FIX=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ fix' || true)
          REFACTOR=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ refactor' || true)
          PERF=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ perf' || true)
          BREAKING=$(echo "$COMMITS" | grep -cE '!:' || true)
          CHORE=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ chore' || true)
          DOCS=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ docs' || true)
          CI=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ ci' || true)

          if [ "$BREAKING" -gt 0 ] || [ "$FEAT" -gt 0 ]; then
            BUMP="minor"
          elif [ "$FIX" -gt 0 ] || [ "$REFACTOR" -gt 0 ] || [ "$PERF" -gt 0 ]; then
            BUMP="patch"
          else
            BUMP="none"
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "feat=$FEAT" >> $GITHUB_OUTPUT
          echo "fix=$FIX" >> $GITHUB_OUTPUT
          echo "refactor=$REFACTOR" >> $GITHUB_OUTPUT
          echo "perf=$PERF" >> $GITHUB_OUTPUT
          echo "breaking=$BREAKING" >> $GITHUB_OUTPUT
          echo "chore=$CHORE" >> $GITHUB_OUTPUT
          echo "docs=$DOCS" >> $GITHUB_OUTPUT
          echo "ci=$CI" >> $GITHUB_OUTPUT

          echo "ЁЯУК Analysis: $TOTAL commits | bump=$BUMP"

      - name: Calculate new version
        id: version
        if: steps.analyze.outputs.bump != 'none' && steps.analyze.outputs.bump != ''
        run: |
          BUMP=${{ steps.analyze.outputs.bump }}
          CURRENT=${{ steps.analyze.outputs.current }}
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case $BUMP in
            minor) NEW="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT
          echo "ЁЯОп Version bump: $CURRENT тЖТ $NEW ($BUMP)"

      - name: Install Rust
        if: steps.version.outputs.new != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.version.outputs.new != ''
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Apply version bump
        if: steps.version.outputs.new != ''
        run: |
          NEW=${{ steps.version.outputs.new }}
          echo "$NEW" > VERSION
          sed -i "s/^version = \".*\"/version = \"$NEW\"/" Cargo.toml
          [ -f src/lib.rs ] && sed -i "s/pub const VERSION: \&str = \".*\";/pub const VERSION: \&str = \"$NEW\";/" src/lib.rs
          if [ -f CHANGELOG.md ]; then
            TODAY=$(date +%Y-%m-%d)
            sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n### Added\n\n### Changed\n\n### Fixed\n\n---\n\n## [$NEW] - $TODAY/" CHANGELOG.md
          fi
          git add VERSION Cargo.toml src/lib.rs CHANGELOG.md
          git commit -m "chore: bump version to $NEW [skip ci]"
          git tag -a "v$NEW" -m "Release v$NEW"
          git push origin main --tags

      - name: Build release binary
        if: steps.version.outputs.new != ''
        run: cargo build --release

      - name: Generate professional release notes
        id: notes
        if: steps.version.outputs.new != ''
        run: |
          NEW=${{ steps.version.outputs.new }}
          CURRENT=${{ steps.analyze.outputs.current }}
          TOTAL=${{ steps.analyze.outputs.total }}
          FEAT=${{ steps.analyze.outputs.feat }}
          FIX=${{ steps.analyze.outputs.fix }}
          REFACTOR=${{ steps.analyze.outputs.refactor }}
          PERF=${{ steps.analyze.outputs.perf }}
          BREAKING=${{ steps.analyze.outputs.breaking }}
          CHORE=${{ steps.analyze.outputs.chore }}
          DOCS=${{ steps.analyze.outputs.docs }}
          CI=${{ steps.analyze.outputs.ci }}

          {
            echo "# NEXUS-AI-Gateway v${NEW}"
            echo ""
            echo "> **Version**: ${NEW} | **Previous**: ${CURRENT} | **Commits**: ${TOTAL} | **Date**: $(date +%Y-%m-%d)"
            echo ""
            echo "---"
            echo ""

            FEAT_LIST=$(git log "v${CURRENT}..HEAD~1" --format="- %s (\`%h\`)" | grep -E "^- feat" || true)
            if [ -n "$FEAT_LIST" ]; then
              echo "## тЬи New Features"
              echo ""
              echo "$FEAT_LIST"
              echo ""
            fi

            FIX_LIST=$(git log "v${CURRENT}..HEAD~1" --format="- %s (\`%h\`)" | grep -E "^- fix" || true)
            if [ -n "$FIX_LIST" ]; then
              echo "## ЁЯРЫ Bug Fixes"
              echo ""
              echo "$FIX_LIST"
              echo ""
            fi

            REFACTOR_LIST=$(git log "v${CURRENT}..HEAD~1" --format="- %s (\`%h\`)" | grep -E "^- (refactor|perf)" || true)
            if [ -n "$REFACTOR_LIST" ]; then
              echo "## тЩ╗я╕П Refactoring & Performance"
              echo ""
              echo "$REFACTOR_LIST"
              echo ""
            fi

            OTHER_LIST=$(git log "v${CURRENT}..HEAD~1" --format="- %s (\`%h\`)" | grep -E "^- (chore|ci|docs|build|style|test)" || true)
            if [ -n "$OTHER_LIST" ]; then
              echo "## ЁЯФз Maintenance"
              echo ""
              echo "$OTHER_LIST"
              echo ""
            fi

            echo "---"
            echo ""
            echo "### ЁЯУК Release Statistics"
            echo ""
            echo "| Type | Count |"
            echo "|:-----|------:|"
            [ "$FEAT" -gt 0 ] && echo "| тЬи Features | $FEAT |"
            [ "$FIX" -gt 0 ] && echo "| ЁЯРЫ Bug Fixes | $FIX |"
            [ "$REFACTOR" -gt 0 ] && echo "| тЩ╗я╕П Refactoring | $REFACTOR |"
            [ "$PERF" -gt 0 ] && echo "| тЪб Performance | $PERF |"
            [ "$CHORE" -gt 0 ] && echo "| ЁЯФз Chores | $CHORE |"
            [ "$DOCS" -gt 0 ] && echo "| ЁЯУЭ Documentation | $DOCS |"
            [ "$CI" -gt 0 ] && echo "| ЁЯФД CI/CD | $CI |"
            echo "| **Total** | **$TOTAL** |"
            echo ""
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/v${CURRENT}...v${NEW}"
            echo ""
            echo "*Released by [Auto Version & Release](https://github.com/${{ github.repository }}/actions/workflows/auto-version.yml) ┬╖ Authored by @enerBydev*"
          } > /tmp/release_notes.md

          echo "body_path=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.new != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "NEXUS-AI-Gateway ${{ steps.version.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.body_path }}
          files: target/release/nexus-ai-gateway
          draft: false
          prerelease: false
