name: Auto Version & Release
# This workflow auto-bumps version based on conventional commits
# and creates a GitHub release when pushed to main.
#
# Trigger: Runs after CI/CD Pipeline passes on main
# Logic: Analyzes commits since last tag → determines bump → creates release
# Author: Commits as repo owner (enerBydev), not github-actions bot

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  auto-version:
    # Pinned to 22.04 (glibc 2.35) — NOT ubuntu-latest. ubuntu-latest is now 24.04
    # (glibc 2.39), which produces a release binary that fails with
    # "GLIBC_2.39 not found" on glibc < 2.39 hosts (Ubuntu/Pop!_OS 22.04, Debian 12,
    # the prod deploy target). Building on 22.04 yields a binary that runs on
    # glibc >= 2.35 (22.04 and everything newer), so the published Release asset is
    # actually portable and the deploy can install it instead of rebuilding locally.
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git as repo owner
        run: |
          git config user.name "enerBydev"
          git config user.email "rjmemdoza.s@gmail.com"

      - name: Analyze commits for version bump
        id: analyze
        run: |
          CURRENT_VERSION=$(cat VERSION)
          CURRENT_TAG="v${CURRENT_VERSION}"

          # If the current version's tag doesn't exist (e.g., manual version bump
          # without tag), fall back to the most recent tag as commit baseline.
          if git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            BASE_TAG="$CURRENT_TAG"
            TAG_EXISTS=true
          else
            BASE_TAG=$(git tag --sort=-version:refname | head -1)
            TAG_EXISTS=false
            echo "⚠️ Tag $CURRENT_TAG not found — using $BASE_TAG as baseline"
          fi

          if [ -z "$BASE_TAG" ]; then
            echo "bump=none" >> $GITHUB_OUTPUT
            echo "⚠️ No tags found — skipping auto-version"
            exit 0
          fi

          COMMITS=$(git log "${BASE_TAG}..HEAD" --oneline 2>/dev/null)
          TOTAL=$(echo "$COMMITS" | grep -c '.' || true)

          if [ "$TOTAL" -eq 0 ]; then
            echo "bump=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          FEAT=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ feat' || true)
          FIX=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ fix' || true)
          REFACTOR=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ refactor' || true)
          PERF=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ perf' || true)
          BREAKING=$(echo "$COMMITS" | grep -cE '!:' || true)
          CHORE=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ chore' || true)
          DOCS=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ docs' || true)
          CI=$(echo "$COMMITS" | grep -cE '^[a-f0-9]+ ci' || true)

          if [ "$BREAKING" -gt 0 ] || [ "$FEAT" -gt 0 ]; then
            BUMP="minor"
          elif [ "$FIX" -gt 0 ] || [ "$REFACTOR" -gt 0 ] || [ "$PERF" -gt 0 ]; then
            BUMP="patch"
          else
            BUMP="none"
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "base_tag=$BASE_TAG" >> $GITHUB_OUTPUT
          echo "tag_exists=${TAG_EXISTS:-false}" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "feat=$FEAT" >> $GITHUB_OUTPUT
          echo "fix=$FIX" >> $GITHUB_OUTPUT
          echo "refactor=$REFACTOR" >> $GITHUB_OUTPUT
          echo "perf=$PERF" >> $GITHUB_OUTPUT
          echo "breaking=$BREAKING" >> $GITHUB_OUTPUT
          echo "chore=$CHORE" >> $GITHUB_OUTPUT
          echo "docs=$DOCS" >> $GITHUB_OUTPUT
          echo "ci=$CI" >> $GITHUB_OUTPUT

          echo "📊 Analysis: $TOTAL commits | bump=$BUMP"

      - name: Tag current version if missing
        if: steps.analyze.outputs.tag_exists == 'false'
        run: |
          CURRENT_VERSION=$(cat VERSION)
          CURRENT_TAG="v${CURRENT_VERSION}"
          echo "📌 Creating missing tag $CURRENT_TAG for current version"
          git tag -a "$CURRENT_TAG" -m "Release $CURRENT_TAG"
          git push origin "$CURRENT_TAG"

      - name: Calculate new version
        id: version
        if: steps.analyze.outputs.bump != 'none' && steps.analyze.outputs.bump != ''
        run: |
          BUMP=${{ steps.analyze.outputs.bump }}
          CURRENT=${{ steps.analyze.outputs.current }}
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case $BUMP in
            minor) NEW="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT
          echo "🎯 Version bump: $CURRENT → $NEW ($BUMP)"

      - name: Install Rust
        if: steps.version.outputs.new != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.version.outputs.new != ''
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Apply version bump
        if: steps.version.outputs.new != ''
        env:
          BASE_TAG: ${{ steps.analyze.outputs.base_tag }}
        run: |
          NEW=${{ steps.version.outputs.new }}
          echo "$NEW" > VERSION
          sed -i "s/^version = \".*\"/version = \"$NEW\"/" Cargo.toml
          [ -f src/lib.rs ] && sed -i "s/pub const VERSION: \&str = \".*\";/pub const VERSION: \&str = \"$NEW\";/" src/lib.rs
          # Refresh Cargo.lock so the workspace package version matches Cargo.toml.
          # Without this, Cargo.lock stays at the old version and every local `cargo`
          # command rewrites it, producing a perpetual uncommitted `M Cargo.lock`.
          cargo update --workspace
          # Populate CHANGELOG.md from conventional commits (Issue #44 — single source of truth)
          chmod +x scripts/generate-changelog-entries.sh scripts/update-changelog.sh
          ./scripts/update-changelog.sh "$NEW" "$BASE_TAG" || echo "::warning::CHANGELOG update skipped"
          git add VERSION Cargo.toml src/lib.rs CHANGELOG.md Cargo.lock
          git commit -m "chore: bump version to $NEW [skip ci]"
          git tag -a "v$NEW" -m "Release v$NEW"
          git push origin main --tags

      - name: Build release binary
        if: steps.version.outputs.new != ''
        run: cargo build --release

      - name: Generate release notes
        id: notes
        if: steps.version.outputs.new != ''
        env:
          BASE_TAG: ${{ steps.analyze.outputs.base_tag }}
        run: |
          # Issue #44: reuse the shared classifier so GitHub Release notes and
          # CHANGELOG.md are generated from the exact same logic (single source of truth).
          # HEAD~1 excludes the version-bump commit created in the previous step.
          chmod +x scripts/generate-changelog-entries.sh
          ./scripts/generate-changelog-entries.sh "$BASE_TAG" "HEAD~1" /tmp/release_notes.md
          # GitHub Releases require a non-empty body
          [ -s /tmp/release_notes.md ] || printf 'Maintenance release.\n' > /tmp/release_notes.md
          echo "body_path=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.new != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.body_path }}
          files: target/release/nexus-ai-gateway
          draft: false
          prerelease: false
