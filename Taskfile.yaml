version: '3'

vars:
  BINARY_NAME: nexus-ai-gateway
  INSTALL_DIR: '{{.HOME}}/.cargo/bin'
  BUILD_DIR: target/release

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build release binary
    cmds:
      - cargo build --release
    sources:
      - src/**/*.rs
      - Cargo.toml
      - Cargo.lock
    generates:
      - '{{.BUILD_DIR}}/{{.BINARY_NAME}}'

  build-dev:
    desc: Build debug binary
    cmds:
      - cargo build

  install:
    desc: Build and install to ~/.cargo/bin
    # NOTE: ~/.cargo/bin/{{.BINARY_NAME}} is the CANONICAL path.
    # The systemd service uses this path (ExecStart=%h/.cargo/bin/...).
    # Use 'task sync-binary' after any manual build to keep both paths up to date.
    deps: [build]
    cmds:
      - cp {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - chmod +x {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - echo "✅ Installed to {{.INSTALL_DIR}}/{{.BINARY_NAME}}"

  sync-binary:
    desc: Sync built binary to both ~/.cargo/bin and ~/.local/bin with md5 verification
    deps: [build]
    cmds:
      - mkdir -p {{.HOME}}/.local/bin
      - |
        SOURCE_MD5=$(md5sum {{.BUILD_DIR}}/{{.BINARY_NAME}} | awk '{print $1}')
        install -m 0755 {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.INSTALL_DIR}}/{{.BINARY_NAME}}
        install -m 0755 {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.HOME}}/.local/bin/{{.BINARY_NAME}}
        CARGO_MD5=$(md5sum {{.INSTALL_DIR}}/{{.BINARY_NAME}} | awk '{print $1}')
        LOCAL_MD5=$(md5sum {{.HOME}}/.local/bin/{{.BINARY_NAME}} | awk '{print $1}')
        echo ""
        echo "md5sum verification:"
        echo "  target/release/{{.BINARY_NAME}}  ${SOURCE_MD5}"
        echo "  ~/.cargo/bin/{{.BINARY_NAME}}    ${CARGO_MD5}"
        echo "  ~/.local/bin/{{.BINARY_NAME}}    ${LOCAL_MD5}"
        echo ""
        if [ "${SOURCE_MD5}" = "${CARGO_MD5}" ] && [ "${SOURCE_MD5}" = "${LOCAL_MD5}" ]; then
          echo "✅ All 3 locations match — stale binary bug prevented"
        else
          echo "❌ CHECKSUM MISMATCH — DO NOT USE"
          exit 1
        fi

  local-install:
    desc: Build and install to ~/.cargo/bin (alias for install)
    cmds:
      - task: install

  uninstall:
    desc: Remove installed binary
    cmds:
      - rm -f {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - echo "✅ Uninstalled {{.BINARY_NAME}}"

  run:
    desc: Run in development mode
    cmds:
      - cargo run

  run-release:
    desc: Run release build
    deps: [build]
    cmds:
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}}

  test:
    desc: Run all tests
    cmds:
      - cargo test

  test-verbose:
    desc: Run tests with verbose output
    cmds:
      - cargo test -- --nocapture --test-threads=1

  fmt:
    desc: Format code
    cmds:
      - cargo fmt

  fmt-check:
    desc: Check code formatting
    cmds:
      - cargo fmt -- --check

  lint:
    desc: Run clippy linter
    cmds:
      - cargo clippy -- -D warnings

  lint-fix:
    desc: Run clippy with auto-fix
    cmds:
      - cargo clippy --fix --allow-dirty --allow-staged

  check:
    desc: Run all checks (fmt, lint, test)
    cmds:
      - task: fmt-check
      - task: lint
      - task: test

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean
      - echo "✅ Cleaned build artifacts"

  watch:
    desc: Watch and auto-reload on changes
    cmds:
      - cargo watch -x run

  watch-test:
    desc: Watch and run tests on changes
    cmds:
      - cargo watch -x test

  audit:
    desc: Check for security vulnerabilities
    cmds:
      - cargo audit

  sanitize-unicode:
    desc: "Replace Unicode with ASCII in Rust source files"
    cmds:
      - bash scripts/sanitize-unicode.sh

  sanitize-unicode-check:
    desc: "Verify no Unicode in source files (CI mode)"
    cmds:
      - bash scripts/sanitize-unicode.sh --check

  update:
    desc: Update dependencies
    cmds:
      - cargo update

  size:
    desc: Show binary size
    deps: [build]
    cmds:
      - ls -lh {{.BUILD_DIR}}/{{.BINARY_NAME}} | awk '{print "Binary size:", $5}'
      - file {{.BUILD_DIR}}/{{.BINARY_NAME}}

  bench:
    desc: Run benchmarks (if any)
    cmds:
      - cargo bench

  doc:
    desc: Generate and open documentation
    cmds:
      - cargo doc --open --no-deps

  tree:
    desc: Show dependency tree
    cmds:
      - cargo tree

  outdated:
    desc: Check for outdated dependencies
    cmds:
      - cargo outdated

  prepare-release:
    desc: Prepare for release (check, build, test)
    cmds:
      - task: clean
      - task: check
      - task: build
      - task: size
      - echo "✅ Release build ready at {{.BUILD_DIR}}/{{.BINARY_NAME}}"

  dev:
    desc: Start development server with auto-reload
    cmds:
      - task: watch

  start:
    desc: Start the proxy server (release mode)
    deps: [build]
    cmds:
      - |
        if [ -z "$UPSTREAM_BASE_URL" ]; then
          echo "⚠️  Error: UPSTREAM_BASE_URL is required"
          echo "Set it with: export UPSTREAM_BASE_URL=https://openrouter.ai/api"
          echo "Or OpenAI: export UPSTREAM_BASE_URL=https://api.openai.com"
          echo "Or local: export UPSTREAM_BASE_URL=http://localhost:11434"
          exit 1
        fi
        ./{{.BUILD_DIR}}/{{.BINARY_NAME}}

  help:
    desc: Show help information
    cmds:
      - echo "nexus-ai-gateway - Anthropic API to OpenAI proxy"
      - echo ""
      - echo "Common tasks:"
      - echo "  task build          - Build release binary"
      - echo "  task install        - Build and install to ~/.cargo/bin"
      - echo "  task run            - Run in development mode"
      - echo "  task dev            - Start with auto-reload"
      - echo "  task test           - Run tests"
      - echo "  task check          - Run all checks"
      - echo "  task clean          - Clean build artifacts"
      - echo ""
      - echo "Environment variables:"
      - echo "  UPSTREAM_BASE_URL            - Upstream endpoint URL (required)"
      - echo "  UPSTREAM_API_KEY             - API key for upstream service"
      - echo "  PORT                         - Server port (default 8315)"
      - echo "  REASONING_MODEL              - Override model for thinking mode"
      - echo "  COMPLETION_MODEL             - Override model for standard mode"
      - echo "  DEBUG                        - Enable debug logging (1 or true)"

  
  setup-hooks:
    desc: Configure git to use portable hooks from scripts/hooks/
    cmds:
      - bash scripts/setup-hooks.sh

  # SERVICE MANAGEMENT (systemd user service)
  service-install:
    desc: Install systemd user service (auto-start, auto-restart)
    deps: [install]
    cmds:
      - bash scripts/install-service.sh

  service-uninstall:
    desc: Remove systemd user service
    cmds:
      - bash scripts/install-service.sh --uninstall

  service-status:
    desc: Check proxy service status
    cmds:
      - systemctl --user status nexus-ai-gateway --no-pager -l

  service-restart:
    desc: Restart proxy service
    cmds:
      - systemctl --user restart nexus-ai-gateway
      - sleep 1
      - systemctl --user status nexus-ai-gateway --no-pager -l | head -10

  service-logs:
    desc: Follow proxy service logs
    cmds:
      - tail -f /tmp/nexus-ai-gateway.log

  # VERSION MANAGEMENT
  version:
    desc: Show current version
    cmds:
      - echo "Cargo.toml: $(grep '^version' Cargo.toml)"
      - '[ -f VERSION ] && echo "VERSION file: $(cat VERSION)" || echo "VERSION file: not found"'
      - git describe --tags --always 2>/dev/null || echo "Git tag: none"

  bump-patch:
    desc: Bump PATCH version (0.5.0 → 0.5.1)
    cmds:
      - ./scripts/bump-version.sh $(./scripts/increment-version.sh patch)

  bump-minor:
    desc: Bump MINOR version (0.5.0 → 0.6.0)
    cmds:
      - ./scripts/bump-version.sh $(./scripts/increment-version.sh minor)

  bump-major:
    desc: Bump MAJOR version (0.5.0 → 1.0.0)
    cmds:
      - ./scripts/bump-version.sh $(./scripts/increment-version.sh major)

  release:
    desc: Create and push a release tag
    cmds:
      - |
        VERSION=$(cat VERSION 2>/dev/null || grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
        TAG="v$VERSION"
        echo "Creating release for version $VERSION"
        echo "Tag: $TAG"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists"
          echo "To create a new release, bump the version first:"
          echo "  task bump-patch  # or bump-minor, bump-major"
          exit 1
        fi
        git tag -a "$TAG" -m "Release $VERSION"
        git push origin "$TAG"
        echo "✅ Release tag $TAG created and pushed"
        echo "GitHub Actions will now build and create the release"
    sources:
      - VERSION
      - Cargo.toml

  auto-version:
    desc: Auto-detect version bump from commits and apply (feat→minor, fix→patch)
    cmds:
      - bash scripts/auto-version.sh --apply

  auto-version-dry:
    desc: Preview auto-version bump without applying
    cmds:
      - bash scripts/auto-version.sh --dry-run

  version-check:
    desc: Validate version sync across VERSION, Cargo.toml, lib.rs
    cmds:
      - |
        V1=$(cat VERSION)
        V2=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
        V3=$(grep 'pub const VERSION' src/lib.rs | sed 's/.*"\(.*\)".*/\1/')
        TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
        echo "VERSION file:  $V1"
        echo "Cargo.toml:    $V2"
        echo "src/lib.rs:    $V3"
        echo "Git tag:       $TAG"
        if [ "$V1" = "$V2" ] && [ "$V1" = "$V3" ]; then
          echo "✅ All 3 sources in sync"
        else
          echo "❌ VERSION MISMATCH"
          exit 1
        fi

  full-release:
    desc: One-command release (auto-bump + commit + tag + push + CI → GitHub Release)
    cmds:
      - task: auto-version
      - git push origin main --tags
      - echo "✅ Release pushed. GitHub Actions will build and publish."

  # GIT SYNC DAEMON (Layer 1 of 3-layer autonomous sync)
  git-sync:
    desc: One-shot git sync (pull if remote ahead)
    cmds:
      - bash scripts/nexus-git-sync.sh sync

  git-sync-install:
    desc: Install autonomous git-sync daemon service
    cmds:
      - bash scripts/nexus-git-sync.sh install

  git-sync-uninstall:
    desc: Remove autonomous git-sync daemon service
    cmds:
      - bash scripts/nexus-git-sync.sh uninstall

  git-sync-status:
    desc: Show git-sync daemon status and sync state
    cmds:
      - bash scripts/nexus-git-sync.sh status

  git-sync-log:
    desc: Follow git-sync daemon log
    cmds:
      - bash scripts/nexus-git-sync.sh log

  setup:
    desc: Full project setup (build, install, hooks, sync daemon, service)
    cmds:
      - task: install
      - task: setup-hooks
      - task: git-sync-install
      - echo "✅ Project ready! All sync layers active."

