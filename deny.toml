[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
# No active ignores. The previous RUSTSEC ignores (daemonize / instant /
# number_prefix) are no longer in the dependency tree. Re-add an entry here only
# if an advisory genuinely matches a crate we cannot upgrade.
ignore = []
unmaintained = "none"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
private = { ignore = true }
exceptions = [
    { allow = ["ISC", "OpenSSL"], name = "ring" },
    { allow = ["CDLA-Permissive-2.0"], name = "webpki-roots" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
